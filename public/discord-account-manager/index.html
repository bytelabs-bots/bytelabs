<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Discord Account Manager</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .manager-card { margin-bottom: 16px; }
        .actions-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .status-pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #111; color: #fff; font-size: 0.85rem; margin-top: 8px; }
        .status-pill.connected { background: #0f8a2a; }
    </style>
</head>
<body>
    <div style="max-width:960px;margin:40px auto;">
        <header class="site-header">
            <img src="/logo.svg" class="logo" alt="Vault logo">
            <div class="invertible">
                <h1>Discord Account Manager</h1>
                <p class="hint">Connect and disconnect Discord accounts from your stored vault tokens with Discord selfbot support.</p>

                <div class="panel">
                    <label for="shardSelect" style="display:block; margin-bottom:6px; font-weight:600;">Shard</label>
                    <select id="shardSelect"></select>
                    <div id="shardHint" class="hint" style="margin-top:6px;"></div>
                    <input id="vaultUser" placeholder="Vault username">
                    <input id="master" type="password" placeholder="Master password">
                    <div class="actions-row">
                        <button onclick="loadAccounts()">Load Accounts</button>
                    </div>
                </div>

                <div id="manager-status" class="panel"></div>
                <div id="accounts"></div>
            </div>
        </header>
    </div>

    <script>
        const PANEL_ORIGINS = [
            window.location.origin,
            'https://verbose-umbrella-jr5965qjwpq53j5vj-3000.app.github.dev'
        ];
        let currentMaster = '';
        let currentPanelWindow = null;

        function getSelectedShardId() {
            const select = document.getElementById('shardSelect');
            if (!select) return 0;
            const value = Number(select.value);
            return Number.isInteger(value) && value >= 0 ? value : 0;
        }

        function setSelectedShardId(shardId) {
            const select = document.getElementById('shardSelect');
            if (!select) return;
            const value = String(shardId ?? 0);
            if (Array.from(select.options).some(option => option.value === value)) {
                select.value = value;
            }
            localStorage.setItem('byteLabsShardId', value);
        }

        async function loadShardOptions() {
            const select = document.getElementById('shardSelect');
            const hint = document.getElementById('shardHint');
            if (!select) return;
            try {
                const res = await fetch('/shards');
                const data = await res.json();
                const shards = Array.isArray(data?.shards) && data.shards.length ? data.shards : [{ id: 1, host: window.location.origin, name: 'shard1' }];
                const current = localStorage.getItem('byteLabsShardId') || String(shards[0]?.id ?? 1);
                select.innerHTML = shards.map(shard => `<option value="${shard.id}">${shard.name} • ${shard.host}</option>`).join('');
                if (Array.from(select.options).some(option => option.value === current)) {
                    select.value = current;
                } else {
                    select.value = String(shards[0]?.id ?? 1);
                }
                setSelectedShardId(select.value);
                if (hint) hint.textContent = `Selected shard ${select.value}`;
            } catch {
                if (hint) hint.textContent = 'Shard selection unavailable';
            }
        }

        async function postWithUser(path, body) {
            const vaultUser = document.getElementById('vaultUser') ? document.getElementById('vaultUser').value.trim() : undefined;
            const payload = Object.assign({}, body || {});
            if (vaultUser) payload.username = vaultUser;
            payload.shardId = getSelectedShardId();
            setSelectedShardId(payload.shardId);
            const res = await fetch(path, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return await res.json();
        }

        async function loadAccounts() {
            const master = document.getElementById('master').value;
            currentMaster = master;
            const status = document.getElementById('manager-status');
            const list = document.getElementById('accounts');

            if (!master) {
                status.innerHTML = '<div class="card">Enter your master password first.</div>';
                list.innerHTML = '';
                return;
            }

            currentMaster = master;
            status.innerHTML = '<div class="card">Loading accounts...</div>';

            const data = await postWithUser('/discord/accounts', { master });

            if (data.error) {
                status.innerHTML = `<div class="card">${data.error}</div>`;
                list.innerHTML = '';
                return;
            }

            const accounts = data.accounts || [];
            if (!accounts.length) {
                list.innerHTML = '<div class="card">No Discord accounts found in the vault.</div>';
                status.innerHTML = '<div class="card">Vault loaded successfully.</div>';
                return;
            }

            status.innerHTML = '<div class="card">Vault loaded successfully.</div>';
            list.innerHTML = accounts.map(account => `
                <div class="card manager-card">
                    <h3>${account.username || 'Unnamed account'}</h3>
                    <div><b>Email:</b> ${account.email || '—'}</div>
                    <div><b>Index:</b> ${account.index}</div>
                    <div class="status-pill ${account.connected ? 'connected' : ''}">${account.connected ? 'Connected' : 'Disconnected'}</div>
                    ${account.connectedUsername ? `<div><b>Active identity:</b> ${account.connectedUsername}</div>` : ''}
                    ${account.connectedUserId ? `<div><b>User ID:</b> ${account.connectedUserId}</div>` : ''}
                    <div class="actions-row" style="margin-top: 12px;">
                        <button onclick="connectAccount(${account.index})">Connect</button>
                        <button onclick="disconnectAccount(${account.index})">Disconnect</button>
                    </div>
                </div>
            `).join('');
        }

        async function connectAccount(index) {
            const master = currentMaster;
            if (!master) {
                alert('Load the vault first');
                return;
            }

            const data = await postWithUser('/discord/connect', { master, index });
            if (data.error) {
                alert(data.error);
                return;
            }
            alert(`Connected as ${data.username || 'Discord account'}`);
            currentPanelWindow = window.open(`/discord-account-manager/panel?index=${index}`, '_blank');
            loadAccounts();
        }

        async function disconnectAccount(index) {
            const master = currentMaster;
            if (!master) {
                alert('Load the vault first');
                return;
            }

            const data = await postWithUser('/discord/disconnect', { master, index });
            if (data.error) {
                alert(data.error);
                return;
            }
            if (currentPanelWindow && !currentPanelWindow.closed) {
                currentPanelWindow.close();
                currentPanelWindow = null;
            }
            alert('Disconnected');
            loadAccounts();
        }

        async function handlePanelMessage(event) {
            if (!PANEL_ORIGINS.includes(event.origin)) return;
            const message = event.data;
            if (!message || message.source !== 'discord-panel') return;

            const { type, requestId, index, invite, guildId, channelId, userId, content, serverName, limit } = message;
            const reply = async (payload) => {
                event.source.postMessage({
                    source: 'discord-manager',
                    requestId,
                    ...payload
                }, event.origin);
            };

            if (!currentMaster) {
                await reply({ error: 'Master password not loaded in manager' });
                return;
            }

            try {
                if (type === 'loadPanel') {
                    const data = await postWithUser('/discord/panel', { master: currentMaster, index });
                    await reply(data);
                    return;
                }

                if (type === 'getGuilds') {
                    const data = await postWithUser('/discord/guilds', { master: currentMaster, index });
                    await reply(data);
                    return;
                }

                if (type === 'listDMs') {
                    const data = await postWithUser('/discord/dm/list', { master: currentMaster, index });
                    await reply(data);
                    return;
                }

                if (type === 'getChannels') {
                    const data = await postWithUser('/discord/guild/channels', { master: currentMaster, index, guildId: message.guildId });
                    await reply(data);
                    return;
                }

                if (type === 'getMembers') {
                    const data = await postWithUser('/discord/guild/members', { master: currentMaster, index, guildId: message.guildId });
                    await reply(data);
                    return;
                }

                if (type === 'getChannelMessages') {
                    const data = await postWithUser('/discord/guild/channel/messages', { master: currentMaster, index, guildId, channelId, limit });
                    await reply(data);
                    return;
                }

                if (type === 'sendChannelMessage') {
                    const data = await postWithUser('/discord/guild/channel/send', { master: currentMaster, index, guildId, channelId, content });
                    await reply(data);
                    return;
                }

                if (type === 'sendChannelPoll') {
                    const data = await postWithUser('/discord/guild/channel/poll/send', { master: currentMaster, index, guildId, channelId, question, answers, duration, allowMultiselect });
                    await reply(data);
                    return;
                }

                if (type === 'voteChannelPoll') {
                    const data = await postWithUser('/discord/guild/channel/poll/vote', { master: currentMaster, index, guildId, channelId, messageId, answerIds });
                    await reply(data);
                    return;
                }

                if (type === 'getVoiceChannelInfo') {
                    const data = await postWithUser('/discord/guild/voicechannel/info', { master: currentMaster, index, guildId, channelId });
                    await reply(data);
                    return;
                }

                if (type === 'joinVoiceChannel') {
                    const data = await postWithUser('/discord/guild/voicechannel/join', { master: currentMaster, index, guildId, channelId });
                    await reply(data);
                    return;
                }

                if (type === 'leaveVoiceChannel') {
                    const data = await postWithUser('/discord/guild/voicechannel/leave', { master: currentMaster, index, guildId });
                    await reply(data);
                    return;
                }

                if (type === 'sendDirectMessage') {
                    const data = await postWithUser('/discord/dm/send', { master: currentMaster, index, userId, content });
                    await reply(data);
                    return;
                }

                if (type === 'readDirectMessages') {
                    const data = await postWithUser('/discord/dm/messages', { master: currentMaster, index, userId, limit });
                    await reply(data);
                    return;
                }

                if (type === 'sendFriendRequest') {
                    const data = await postWithUser('/discord/friend/add', { master: currentMaster, index, userId });
                    await reply(data);
                    return;
                }

                if (type === 'acceptFriendRequest') {
                    const data = await postWithUser('/discord/friend/accept', { master: currentMaster, index, userId });
                    await reply(data);
                    return;
                }

                if (type === 'declineFriendRequest') {
                    const data = await postWithUser('/discord/friend/decline', { master: currentMaster, index, userId });
                    await reply(data);
                    return;
                }

                if (type === 'getFriendRequests') {
                    const data = await postWithUser('/discord/friend/requests', { master: currentMaster, index });
                    await reply(data);
                    return;
                }

                if (type === 'declineFriendRequest') {
                    const data = await postWithUser('/discord/friend/decline', { master: currentMaster, index, userId });
                    await reply(data);
                    return;
                }

                if (type === 'joinServer') {
                    const data = await postWithUser('/discord/server/join', { master: currentMaster, index, invite });
                    await reply(data);
                    return;
                }

                if (type === 'createServer') {
                    const data = await postWithUser('/discord/server/create', { master: currentMaster, index, serverName });
                    await reply(data);
                    return;
                }

                if (type === 'leaveServer') {
                    const data = await postWithUser('/discord/server/leave', { master: currentMaster, index, guildId });
                    await reply(data);
                    return;
                }
            } catch (error) {
                await reply({ error: error.message || 'Manager request failed' });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadShardOptions();
            const select = document.getElementById('shardSelect');
            if (select) {
                select.addEventListener('change', () => {
                    setSelectedShardId(select.value);
                    const hint = document.getElementById('shardHint');
                    if (hint) hint.textContent = `Selected shard ${select.value}`;
                });
            }
        });

        window.addEventListener('message', handlePanelMessage);
    </script>
</body>
</html>
